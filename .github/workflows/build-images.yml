name: Build and Publish Images

on:
  push:
    branches: [docker]
    paths:
      - 'cloudlab/**'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-cloudlab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CloudLab image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./cloudlab/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/anythingllm-cloudlab:docker
            ghcr.io/${{ github.repository_owner }}/anythingllm-cloudlab:${{ github.sha }}