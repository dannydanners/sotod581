version: "3.9"

services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - rag-network

  anythingllm:
    image: mintplexlabs/anythingllm:latest
    container_name: anythingllm
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - anythingllm_storage:/app/server/storage
    environment:
      VECTOR_DB: qdrant
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - qdrant
    networks:
      - rag-network

volumes:
  qdrant_storage:
  anythingllm_storage:

networks:
  rag-network:
    driver: bridge