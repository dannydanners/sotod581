services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data/hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - --model
      - ${VLLM_MODEL}
      - --host
      - 0.0.0.0
      - --port
      - "8000"

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.8
    container_name: tei
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./data/tei-data:/data
    command:
      - --model-id
      - ${TEI_MODEL}
      - --port
      - "80"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    depends_on:
      - vllm
      - tei
    secrets:
      - cloudflare_tunnel_token
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN}

secrets:
  cloudflare_tunnel_token:
    file: ./secrets/cloudflare_tunnel_token