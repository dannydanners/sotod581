apiVersion: apps/v1
kind: Deployment
metadata:
  name: tei-embed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tei-embed
  template:
    metadata:
      labels:
        app: tei-embed
    spec:
      enableServiceLinks: false
      nodeSelector:
        role: worker
      containers:
        - name: tei
          image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
          args:
            - --model-id
            - intfloat/e5-small
            - --hostname
            - 0.0.0.0
            - --port
            - "80"
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
            - name: tei-cache
              mountPath: /data
      volumes:
        - name: tei-cache
          hostPath:
            path: /var/lib/tei-cache
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: tei-embed-svc
spec:
  selector:
    app: tei-embed
  ports:
    - port: 8000
      targetPort: 80
  type: ClusterIP